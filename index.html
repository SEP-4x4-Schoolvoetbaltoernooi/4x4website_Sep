<!DOCTYPE html>
<html lang="nl">
<head>
<!-- ... (vorige head content blijft hetzelfde) ... -->
<style>
  /* ... (vorige styles blijven hetzelfde) ... */
  #status-text.no-update {
    color: #ffd700 !important;
    font-style: italic;
  }
  .update-notice {
    background: rgba(255,215,0,0.1);
    color: #8B4513;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 0.8rem;
    margin: 10px 0;
    text-align: center;
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <div><div class="logo">SEP <span>4x4 Toernooi 2026</span></div></div>
  <div class="header-meta">
    <h2>Live Standen &amp; Wedstrijden · 8 April 2026</h2>
    <div id="status-bar">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Laden...</span>
    </div>
    <div id="next-refresh"></div>
    <div id="update-notice" class="update-notice" style="display: none;"></div>
  </div>
  <div class="header-actions">
    <button id="btn-refresh" onclick="loadFromGitHub()">⟳ Vernieuwen</button>
  </div>
</header>

<!-- ... (rest van de HTML blijft hetzelfde) ... -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ════════════════════════════════════════════════
//  CONFIGURATIE — pas alleen deze regel aan
// ════════════════════════════════════════════════
const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/SEP-4x4-Schoolvoetbaltoernooi/4x4website_Sep/main/Master.XLSM';
let lastModified = null;
// ════════════════════════════════════════════════

let allPoules = [], currentFilter = 'all', currentTab = 'standings', selectedPoule = 'all';
let refreshTimer = null, refreshCountdown = 30;

// ── LOAD FROM GITHUB ──
async function loadFromGitHub() {
  setStatus('Laden...', false);
  document.getElementById('btn-refresh').disabled = true;
  document.getElementById('update-notice').style.display = 'none';
  try {
    const url = GITHUB_RAW_URL + '?t=' + Date.now(); // cache bust
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status} — controleer of het bestand op GitHub staat.`);

    const currentModified = resp.headers.get('Last-Modified');
    if (lastModified && currentModified === lastModified) {
      setStatus('Geen nieuwe wijzigingen sinds laatste update', false);
      document.getElementById('status-text').classList.add('no-update');
      document.getElementById('update-notice').textContent = 'Geen nieuwe wijzigingen in het Excel-bestand sinds de laatste update.';
      document.getElementById('update-notice').style.display = 'block';
      document.getElementById('btn-refresh').disabled = false;
      return;
    }
    lastModified = currentModified;

    const buf = await resp.arrayBuffer();
    parseExcel(buf);
    setStatus(`Bijgewerkt: ${new Date().toLocaleTimeString('nl-NL')}`, true);
    showApp();
    if (currentTab === 'standings') renderStandings();
    else renderMatches();
    buildPouleSelector();
    startAutoRefresh();
  } catch (err) {
    console.error(err);
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-screen').style.display = '';
    document.getElementById('error-msg').textContent = err.message;
    setStatus('Fout bij laden', false);
  }
  document.getElementById('btn-refresh').disabled = false;
}

// ... (rest van de JavaScript blijft hetzelfde) ...
</script>
</body>
</html>
