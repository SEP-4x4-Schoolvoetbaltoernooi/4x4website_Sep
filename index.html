<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vv SEP Voetbaltoernooi – Live</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* vv SEP Kleuren: Rood & Wit */
    --sep-red: #cc0000; 
    --sep-red-dark: #8b0000; 
    --sep-red-light: #ff3333;
    --gold: #f0b429; 
    --white: #ffffff; 
    --bg-dark: #1a1a1a; 
    --text-muted: #a0a0a0;
    --card-bg: rgba(255,255,255,.05); 
    --card-border: rgba(255,255,255,.1);
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg-dark); color: var(--white); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, var(--sep-red-dark) 0%, var(--sep-red) 60%, var(--sep-red-light) 100%);
    padding: 22px 32px 16px; 
    position: sticky; 
    top: 0; 
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,.5);
    display: flex; 
    align-items: center; 
    gap: 18px; 
    flex-wrap: wrap;
    border-bottom: 3px solid var(--white);
  }
  
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; color: var(--white); letter-spacing: 2px; line-height: 1; text-shadow: 2px 2px 0 rgba(0,0,0,.3); }
  .logo span { color: var(--gold); }
  
  .header-meta { flex: 1; }
  .header-meta h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 3px; color: rgba(255,255,255,.8); text-transform: uppercase; }
  
  #status-bar { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--gold); animation: pulse 1.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
  #status-text { font-size: .82rem; color: rgba(255,255,255,.7); }
  #next-refresh { font-size: .72rem; color: rgba(255,255,255,.4); margin-top: 3px; }

  .header-actions { display: flex; gap: 8px; align-items: center; }
  #btn-refresh { background: var(--white); color: var(--sep-red-dark); padding: 9px 16px; font-size: .88rem; border: none; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 700; transition: all .2s; }
  #btn-refresh:hover { background: var(--gold); color: #000; }

  .tab-bar { background: rgba(255,255,255,.02); border-bottom: 1px solid var(--card-border); padding: 0 32px; display: flex; }
  .tab { padding: 14px 28px 12px; font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; letter-spacing: 2px; color: rgba(255,255,255,.4); border-bottom: 3px solid transparent; cursor: pointer; transition: all .2s; }
  .tab.active { color: var(--white); border-bottom-color: var(--white); }

  .filter-bar { background: rgba(0,0,0,.2); border-bottom: 1px solid var(--card-border); padding: 12px 32px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: .75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .filter-btn { background: rgba(255,255,255,.07); color: rgba(255,255,255,.6); border: 1px solid var(--card-border); padding: 5px 15px; font-size: .8rem; border-radius: 20px; cursor: pointer; font-weight: 700; transition: all .2s; }
  .filter-btn.active { background: var(--sep-red); color: var(--white); border-color: var(--sep-red-light); }
  .filter-btn:hover { border-color: var(--white); color: var(--white); }

  main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }

  /* Standings Cards */
  #poules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 18px; }
  .poule-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; overflow: hidden; animation: fadeIn .35s ease both; }
  .poule-header { background: var(--sep-red-dark); padding: 11px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--sep-red); }
  .
